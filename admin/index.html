<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Torneo Calcetto Capodacqua</title><link rel="stylesheet" href="../assets/css/style.css"><style>textarea,input{width:100%;padding:14px;border-radius:14px;border:1px solid var(--line);background:#090c09;color:#fff}label{display:block;margin:14px 0 6px;font-weight:800}</style></head><body><header class="topbar"><div class="container nav"><a class="brand" href="../index.html"><img src="../assets/logos/logo-volpe.jpeg"><span>Admin</span></a></div></header><main class="section"><div class="container"><h2>Pannello admin semplice</h2><p class="muted">GitHub Pages non può salvare direttamente sul server. Qui modifichi il JSON, scarichi il file e lo sostituisci nella cartella <b>data</b>.</p><div class="card"><label>Password demo</label><input id="pass" type="password" placeholder="admin123"><button class="btn primary" onclick="login()">Entra</button></div><div id="panel" style="display:none" class="card"><h3>Modifica risultati</h3><textarea id="json" rows="18"></textarea><div class="btns"><button class="btn primary" onclick="downloadJson()">Scarica matches.json</button><button class="btn" onclick="loadData()">Ricarica dati</button></div></div></div></main><script>async function loadData(){const d=await fetch('../data/matches.json').then(r=>r.json());json.value=JSON.stringify(d,null,2)}function login(){if(pass.value==='admin123'){panel.style.display='block';loadData()}else alert('Password errata')}function downloadJson(){const blob=new Blob([json.value],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matches.json';a.click()}</script></body></html>
